# ★ 运行时中间件 6 件套 (Windows + Linux + Mac 一键部署)
# 包含: ES / Nacos / Nginx / Prometheus / Grafana / Ollama
#
# 用法:
#   bash deploy-middleware.sh           # 启动
#   bash deploy-middleware.sh status    # 状态
#   bash deploy-middleware.sh stop      # 停止
#   bash deploy-middleware.sh logs      # 日志
#   bash deploy-middleware.sh reset     # 删除数据 (慎用)
#   bash deploy-middleware.sh pull      # 拉镜像
version: "3.8"

# ★ 公共网络 (跟 11 个微服务用同一个网络, 让 AI Platform 服务能连)
networks:
  ai-platform-net:
    name: ai-platform-net
    driver: bridge

volumes:
  es-data:
  redis-data:
  nacos-data:
  prometheus-data:
  grafana-data:
  ollama-data:

services:
  # ========== 1. Elasticsearch 8.13 (知识库) ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ai-middleware-elasticsearch
    restart: always
    networks: [ai-platform-net]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # ========== 2. Nacos 2.3.1 (配置/注册, 可选) ==========
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: ai-middleware-nacos
    restart: always
    networks: [ai-platform-net]
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root
    volumes:
      - nacos-data:/home/nacos/data

  # ========== 3. Nginx (前端代理) ==========
  nginx:
    image: nginx:alpine
    container_name: ai-middleware-nginx
    restart: always
    networks: [ai-platform-net]
    ports:
      - "8080:80"
    volumes:
      # 复用项目内的 nginx.conf
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ========== 4. Prometheus (指标采集) ==========
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ai-middleware-prometheus
    restart: always
    networks: [ai-platform-net]
    ports:
      - "9090:9090"
    volumes:
      - ../../deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ========== 5. Grafana (可视化) ==========
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ai-middleware-grafana
    restart: always
    networks: [ai-platform-net]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ========== 6. Ollama (本地 LLM 服务, AI backend=ollama 时用) ==========
  ollama:
    image: ollama/ollama:latest
    container_name: ai-middleware-ollama
    restart: always
    networks: [ai-platform-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
