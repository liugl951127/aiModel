version: '3.8'

# ★ OP-4 版本标签 (运维经理要求可回滚)
# 部署时: VERSION=2.0.20260618 docker compose up -d
x-image-tag: &image_tag ${VERSION:-2.0.20260618}

services:
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: ai-nacos
    restart: always    # ★ OP-3
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 30s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: ai-mysql
    restart: always    # ★ OP-3
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ai_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: always    # ★ OP-3
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # ★ OP-6 持久化: AOF + RDB 双保险
    command: redis-server --appendonly yes --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ai-es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # === 业务服务 (11 个) ===
  gateway:
    image: ai-gateway:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.gateway
    container_name: ai-gateway
    restart: always
    depends_on:
      nacos: { condition: service_healthy }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "9000:9000"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required, see scripts/gen-jwt-secret.sh}

  auth:
    image: ai-auth:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.auth
    container_name: ai-auth
    restart: always
    depends_on:
      nacos: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "9001:9001"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}

  user:
    image: ai-user:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.user
    container_name: ai-user
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9002:9002"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  system:
    image: ai-system:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.system
    container_name: ai-system
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9003:9003"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  model:
    image: ai-model:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.model
    container_name: ai-model
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9004:9004"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  agent:
    image: ai-agent:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.agent
    container_name: ai-agent
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9005:9005"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  knowledge:
    image: ai-knowledge:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.knowledge
    container_name: ai-knowledge
    restart: always
    depends_on:
      nacos: { condition: service_healthy }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    ports:
      - "9006:9006"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      ES_HOST: elasticsearch

  inference:
    image: ai-inference:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.inference
    container_name: ai-inference
    restart: always
    depends_on: [nacos]
    ports:
      - "9007:9007"
    environment:
      NACOS_SERVER: nacos:8848
    volumes:
      - /opt/ai-platform/inference-bundles:/opt/ai-platform/inference-bundles

  trainer:
    image: ai-trainer:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.trainer
    container_name: ai-trainer
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9008:9008"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  files:
    image: ai-files:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.files
    container_name: ai-files
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9010:9010"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  workflow:
    image: ai-workflow:*image_tag
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile.workflow
    container_name: ai-workflow
    restart: always
    depends_on: [nacos, mysql, redis]
    ports:
      - "9011:9011"
    environment:
      NACOS_SERVER: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  web:
    image: nginx:alpine
    container_name: ai-web
    restart: always
    depends_on: [gateway]
    ports:
      - "8080:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../../frontend/dist:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # === 监控 (可选) ===
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ai-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: ["monitoring"]    # 不默认启动, 加 --profile monitoring 才会起

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ai-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    profiles: ["monitoring"]

volumes:
  nacos-data:
  mysql-data:
  redis-data:
  es-data:
  grafana-data:

networks:
  default:
    name: ai-platform-net
