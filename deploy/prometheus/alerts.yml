groups:
  - name: ai-platform-alerts
    interval: 30s
    rules:
      # 服务宕机
      - alert: ServiceDown
        expr: up{job="ai-platform"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.instance }} 不可用"
          description: "已停止响应超过 2 分钟"

      # CPU 高
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU > 85%"

      # 内存高
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 内存 > 90%"

      # 磁盘满
      - alert: DiskFull
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} 磁盘 > 85%"

      # 慢请求
      - alert: SlowResponse
        expr: histogram_quantile(0.99, sum by(uri, le) (rate(http_server_requests_seconds_bucket[5m]))) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.uri }} 99 分位响应时间 > 3s"
