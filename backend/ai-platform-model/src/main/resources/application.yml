# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

server:
  port: 9004

spring:
  application:
    name: ai-platform-model
  main:
    allow-bean-definition-overriding: true
  config:
    import: nacos:ai-platform-model.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 10000
            read-timeout: 30000
      retryer: 0
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
  # 注: Redisson 自动从 spring.data.redis 读配置, 无需额外 yaml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
# ★ OP-1 Actuator 运维端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
