# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

spring:
  application:
    name: ai-platform-files
  main:
    allow-bean-definition-overriding: true
  config:
    import: nacos:ai-platform-files.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 10000
            read-timeout: 30000
      retryer: 0
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: 9010
  servlet:
    context-path: /

aiplatform:
  files:
    root: /opt/ai-platform/files
    http-path: /files
    default-bucket: kb
    max-upload-mb: 200

nacos:
  config:
    import-check:
      enabled: false
  discovery:
    enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: status
