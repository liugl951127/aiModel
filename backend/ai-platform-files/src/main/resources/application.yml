spring:
  application:
    name: ai-platform-files
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASS:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aiplatform_files?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 9010
  servlet:
    context-path: /

aiplatform:
  files:
    root: /opt/ai-platform/files
    http-path: /files
    default-bucket: kb
    max-upload-mb: 200

nacos:
  config:
    import-check:
      enabled: false
  discovery:
    enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: status
