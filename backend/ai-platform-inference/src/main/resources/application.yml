server:
  port: 9007

spring:
  application:
    name: ai-platform-inference
  main:
    allow-bean-definition-overriding: true
  config:
    import: "nacos:ai-platform-inference.yaml"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ----- Nacos is OPTIONAL. Default off so service can start standalone -----
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASS:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false

  # Inference service has no DB; Redis is optional. Both auto-configurations
  # are disabled so the service can run with zero infrastructure.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform
  inference:
    bundle-root: ${INFERENCE_BUNDLE_ROOT:/opt/ai-platform/inference-bundles}
    bundle-default: ${INFERENCE_BUNDLE_DEFAULT:default}

logging:
  level:
    com.aiplatform: INFO
