# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

server:
  port: 9100

spring:
  application:
    name: seata-demo
  main:
    allow-bean-definition-overriding: true
  config:
    import: nacos:seata-demo.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
seata:
  enabled: true
  application-id: seata-demo
  tx-service-group: my_test_tx_group
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: ""
      username: ${NACOS_USER:nacos}
      password: ${NACOS_PASS:nacos}
      cluster: default
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      username: ${NACOS_USER:nacos}
      password: ${NACOS_PASS:nacos}
      namespace: ""
      group: SEATA_GROUP
  service:
    vgroup-mapping:
      my_test_tx_group: default
    grouplist:
      default: 127.0.0.1:8091
  client:
    rm:
      report-success-enable: false
      async-commit-buffer-limit: 10000
      lock:
        retry-interval: 10
        retry-times: 30
        retry-policy-branch-rollback-on-conflict: true
    tm:
      commit-retry-count: 5
      rollback-retry-count: 5
  transport:
    shutdown:
      wait: 3
    thread-factory:
      boss-thread-prefix: NettyBoss
      worker-thread-prefix: NettyClientNIOWorker
      boss-thread-size: 1
    type: TCP
    serialization: seata
    compressor: none
    enable-tm-client-batch-send-request: false
  log:
    exception-rate: 100

# 关闭 mybatis-plus auto-config（多数据源时由我们自己接管 SqlSessionFactory）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.aiplatform.seata: DEBUG
    io.seata: INFO

aiplatform:
  jwt:
    enabled: false
