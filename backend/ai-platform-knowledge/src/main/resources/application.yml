server:
  port: 9006
  servlet:
    context-path: /
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

spring:
  application:
    name: ai-platform-knowledge
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

aiplatform:
  knowledge:
    storage-path: ${KB_STORAGE_PATH:/opt/ai-platform/kb}
  elasticsearch:
    enabled: ${ES_ENABLED:true}
    host: ${ES_HOST:127.0.0.1}
    port: ${ES_PORT:9200}
    scheme: ${ES_SCHEME:http}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

logging:
  level:
    com.aiplatform: INFO
    org.apache.tika: WARN
