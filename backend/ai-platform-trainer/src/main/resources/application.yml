# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

server:
  port: 9008

spring:
  application:
    name: ai-platform-trainer
  main:
    allow-bean-definition-overriding: true
  config:
    import: "optional:nacos:ai-platform-trainer.yaml"
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 10000
            read-timeout: 30000
      retryer: 0
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:8ce0051f919040db82c8058f74ff20a80fb039c8de194656512a8ea7207552da}
    expiration: 86400000
    issuer: ai-platform
  trainer:
    export-root: ${TRAINER_EXPORT_ROOT:/opt/ai-platform/inference-bundles}
  # ★ v3.1 从 inference 合并入的 AI Backend 配置
  ai:
    backend: ${AI_BACKEND:mock}
    ollama:
      url: ${OLLAMA_URL:http://127.0.0.1:11434}
      model: ${OLLAMA_MODEL:qwen2:7b}
    http:
      url: ${HTTP_AI_URL:http://127.0.0.1:8000}
      api-key: ${HTTP_AI_KEY:}
    internal:
      enabled: ${AI_INTERNAL_ENABLED:true}
      threads: ${AI_INTERNAL_THREADS:4}
  # ★ v3.1 inference 配置合并入
  inference:
    bundle-root: ${INFERENCE_BUNDLE_ROOT:/opt/ai-platform/inference-bundles}
    bundle-default: ${INFERENCE_BUNDLE_DEFAULT:default}

logging:
  level:
    com.aiplatform: INFO
    ai.djl: WARN
# ★ OP-1 Actuator 运维端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
