# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

server:
  port: 9000

spring:
  application:
    name: ai-platform-gateway
  main:
    allow-bean-definition-overriding: true
  config:
    import: nacos:ai-platform-gateway.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-route
          uri: ${AUTH_URI:lb://ai-platform-auth}
          predicates:
            - Path=/api/auth/**
        - id: user-route
          uri: ${USER_URI:lb://ai-platform-user}
          predicates:
            - Path=/api/user/**,/api/tenant/**
        - id: system-route
          uri: ${SYSTEM_URI:lb://ai-platform-system}
          predicates:
            - Path=/api/system/**,/api/menu/**,/api/role/**,/api/dict/**
        - id: model-route
          uri: ${MODEL_URI:lb://ai-platform-model}
          predicates:
            - Path=/api/model/**,/api/dataset/**
        - id: agent-route
          uri: ${AGENT_URI:lb://ai-platform-agent}
          predicates:
            - Path=/api/agent/**,/api/tool/**,/api/conversation/**,/api/web/**
        - id: knowledge-route
          uri: ${KNOWLEDGE_URI:lb://ai-platform-knowledge}
          predicates:
            - Path=/api/knowledge/**,/api/document/**
        - id: inference-route
          uri: ${INFERENCE_URI:lb://ai-platform-inference}
          predicates:
            - Path=/api/inference/**,/api/chat/**
        - id: files-route
          uri: ${FILES_URI:lb://ai-platform-files}
          predicates:
            - Path=/api/files/**,/api/chunk/**
        - id: workflow-route
          uri: ${WORKFLOW_URI:lb://ai-platform-workflow}
          predicates:
            - Path=/api/workflow/**
        - id: trainer-route
          uri: ${TRAINER_URI:lb://ai-platform-trainer}
          predicates:
            - Path=/api/trainer/**
        # Swagger UI / OpenAPI 路由 — 入口到 user 服务，user 跳查看所有服务 @FeignClient
        # 也可直接跳转到各服务的 swagger (本路由只供快速查看 user 服务的接口)
        - id: swagger-route
          uri: ${SWAGGER_URI:lb://ai-platform-user}
          predicates:
            - Path=/doc.html,/swagger-ui/**,/webjars/**,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-resources/**

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO
