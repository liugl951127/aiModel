server:
  port: 9000
  servlet:
    context-path: /

spring:
  application:
    name: ai-platform-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-route
          uri: lb://ai-platform-auth
          predicates:
            - Path=/api/auth/**
        - id: user-route
          uri: lb://ai-platform-user
          predicates:
            - Path=/api/user/**,/api/tenant/**
        - id: system-route
          uri: lb://ai-platform-system
          predicates:
            - Path=/api/system/**,/api/menu/**,/api/role/**,/api/dict/**
        - id: model-route
          uri: lb://ai-platform-model
          predicates:
            - Path=/api/model/**,/api/dataset/**,/api/train/**
        - id: agent-route
          uri: lb://ai-platform-agent
          predicates:
            - Path=/api/agent/**,/api/tool/**,/api/conversation/**
        - id: knowledge-route
          uri: lb://ai-platform-knowledge
          predicates:
            - Path=/api/knowledge/**,/api/document/**
        - id: inference-route
          uri: lb://ai-platform-inference
          predicates:
            - Path=/api/inference/**,/api/chat/**

aiplatform:
  jwt:
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
