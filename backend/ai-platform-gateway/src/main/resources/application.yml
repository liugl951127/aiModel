server:
  port: 9000

spring:
  application:
    name: ai-platform-gateway
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ----- Nacos is OPTIONAL (default off) -----
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASS:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false

    # Spring Cloud Gateway routes.
    # uri 走 nacos service name（lb://XXX）时，Spring Cloud LoadBalancer 会从 nacos 拉实例；
    # nacos 关闭时，fallback 到 ${XXX_URL:http://127.0.0.1:PORT} 字面量地址。
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-route
          uri: ${AUTH_URI:lb://ai-platform-auth}
          predicates:
            - Path=/api/auth/**
        - id: user-route
          uri: ${USER_URI:lb://ai-platform-user}
          predicates:
            - Path=/api/user/**,/api/tenant/**
        - id: system-route
          uri: ${SYSTEM_URI:lb://ai-platform-system}
          predicates:
            - Path=/api/system/**,/api/menu/**,/api/role/**,/api/dict/**
        - id: model-route
          uri: ${MODEL_URI:lb://ai-platform-model}
          predicates:
            - Path=/api/model/**,/api/dataset/**
        - id: agent-route
          uri: ${AGENT_URI:lb://ai-platform-agent}
          predicates:
            - Path=/api/agent/**,/api/tool/**,/api/conversation/**,/api/web/**
        - id: knowledge-route
          uri: ${KNOWLEDGE_URI:lb://ai-platform-knowledge}
          predicates:
            - Path=/api/knowledge/**,/api/document/**
        - id: inference-route
          uri: ${INFERENCE_URI:lb://ai-platform-inference}
          predicates:
            - Path=/api/inference/**,/api/chat/**
        - id: files-route
          uri: ${FILES_URI:lb://ai-platform-files}
          predicates:
            - Path=/api/files/**,/api/chunk/**
        - id: workflow-route
          uri: ${WORKFLOW_URI:lb://ai-platform-workflow}
          predicates:
            - Path=/api/workflow/**
        - id: trainer-route
          uri: ${TRAINER_URI:lb://ai-platform-trainer}
          predicates:
            - Path=/api/trainer/**

aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO
