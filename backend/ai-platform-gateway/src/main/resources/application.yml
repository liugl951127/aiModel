# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

server:
  port: 9000
  # 上传体积上限: 单文件 50M, 请求体 60M (含 multipart 额外开销)
  # 上传超这个限制会被网关直接拒绝, 返回 413 + 友好提示
  max-http-request-header-size: 16KB
  tomcat:
    max-swallow-size: 60MB
    max-http-form-post-size: 60MB

spring:
  application:
    name: ai-platform-gateway
  main:
    allow-bean-definition-overriding: true
    # ★ Gateway 是响应式, 必须设为 reactive, 避免与 common 模块传递的 spring-boot-starter-web 冲突
    web-application-type: reactive
  config:
    import: "optional:nacos:ai-platform-gateway.yaml"
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # ★ 路由全部走 nacos service discovery (lb://ai-platform-{module}).
        #   需要 nacos 服务可用 (默认 127.0.0.1:8848), 各业务模块会自动注册.
        #   dev 模式快速测试可用 ${AUTH_URI:http://127.0.0.1:9002} 覆盖.
        - id: auth-route
          uri: ${AUTH_URI:lb://ai-platform-user}
          predicates:
            - Path=/api/auth/**
        - id: user-route
          uri: ${USER_URI:lb://ai-platform-user}
          predicates:
            - Path=/api/user/**,/api/tenant/**
        - id: system-route
          uri: ${SYSTEM_URI:lb://ai-platform-system}
          predicates:
            - Path=/api/system/**,/api/menu/**,/api/role/**,/api/dict/**,/api/biz/**,/api/activity/**,/api/monitor/**
        - id: model-route
          uri: ${MODEL_URI:lb://ai-platform-knowledge}
          predicates:
            - Path=/api/model/**,/api/dataset/**
        - id: agent-route
          uri: ${AGENT_URI:lb://ai-platform-agent}
          predicates:
            - Path=/api/agent/**,/api/tool/**,/api/conversation/**,/api/web/**
        - id: knowledge-route
          uri: ${KNOWLEDGE_URI:lb://ai-platform-knowledge}
          predicates:
            - Path=/api/knowledge/**,/api/document/**
        - id: inference-route
          uri: ${INFERENCE_URI:lb://ai-platform-trainer}
          predicates:
            - Path=/api/inference/**,/api/chat/**
        - id: files-route
          uri: ${FILES_URI:lb://ai-platform-workflow}
          predicates:
            - Path=/api/files/**,/api/chunk/**
        - id: workflow-route
          uri: ${WORKFLOW_URI:lb://ai-platform-workflow}
          predicates:
            - Path=/api/workflow/**
        - id: trainer-route
          uri: ${TRAINER_URI:lb://ai-platform-trainer}
          predicates:
            - Path=/api/trainer/**
        # Swagger UI / OpenAPI 路由 — 入口到 user 服务，user 跳查看所有服务 @FeignClient
        # 也可直接跳转到各服务的 swagger (本路由只供快速查看 user 服务的接口)
        - id: swagger-route
          uri: ${SWAGGER_URI:lb://ai-platform-user}
          predicates:
            - Path=/doc.html,/swagger-ui/**,/webjars/**,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-resources/**

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:8ce0051f919040db82c8058f74ff20a80fb039c8de194656512a8ea7207552da}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: INFO
# ★ OP-1 Actuator 运维端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

# ============================================================
# ★ v3.x 性能优化: 慢 SQL 监控 + MyBatis-Plus 分页拦截器
# 由 ai-platform-web-starter 自动注册, 阈值可覆盖
# ============================================================
aiplatform:
  sql:
    enabled: true
    slow-threshold-ms: 200
    log-enabled: true
  web:
    page:
      enabled: true
