server:
  port: 9000

spring:
  application:
    name: ai-platform-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ----- Nacos is OPTIONAL -----
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false

    # Spring Cloud Gateway routes (use literal URIs when Nacos is off)
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-route
          uri: ${AUTH_URL:http://127.0.0.1:9001}
          predicates:
            - Path=/api/auth/**
        - id: user-route
          uri: ${USER_URL:http://127.0.0.1:9002}
          predicates:
            - Path=/api/user/**,/api/tenant/**
        - id: system-route
          uri: ${SYSTEM_URL:http://127.0.0.1:9003}
          predicates:
            - Path=/api/system/**,/api/menu/**,/api/role/**,/api/dict/**
        - id: model-route
          uri: ${MODEL_URL:http://127.0.0.1:9004}
          predicates:
            - Path=/api/model/**,/api/dataset/**,/api/train/**
        - id: agent-route
          uri: ${AGENT_URL:http://127.0.0.1:9005}
          predicates:
            - Path=/api/agent/**,/api/tool/**,/api/conversation/**
        - id: knowledge-route
          uri: ${KNOWLEDGE_URL:http://127.0.0.1:9006}
          predicates:
            - Path=/api/knowledge/**,/api/document/**
        - id: inference-route
          uri: ${INFERENCE_URL:http://127.0.0.1:9007}
          predicates:
            - Path=/api/inference/**,/api/chat/**

aiplatform:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:ai-platform-default-secret-key-please-change-32+}
    expiration: 86400000
    issuer: ai-platform

logging:
  level:
    com.aiplatform: INFO
    org.springframework.cloud.gateway: INFO
