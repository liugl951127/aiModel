spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  h2:
    console:
      enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379

aiplatform:
  jwt:
    enabled: true
    secret: test-secret-key-32bytes-min-padding
    expiration: 86400000
    issuer: test

logging:
  level:
    org.springframework: WARN
    com.aiplatform: INFO
