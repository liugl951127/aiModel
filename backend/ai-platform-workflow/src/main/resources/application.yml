spring:
  application:
    name: ai-platform-workflow
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 8000
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASS:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aiplatform_workflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 9011

aiplatform:
  trainer:
    base-url: http://127.0.0.1:9008
  inference:
    base-url: http://127.0.0.1:9007
  knowledge:
    base-url: http://127.0.0.1:9005

nacos:
  config:
    import-check:
      enabled: false
  discovery:
    enabled: false
