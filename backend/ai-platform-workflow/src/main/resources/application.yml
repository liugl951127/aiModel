# =====================================================
# Spring Cloud Alibaba 配置 v3 (yml 重构)
# nacos 默认 enabled: true (因为 config.import 拉取).
# 想关闭: --spring.cloud.nacos.discovery.enabled=false
#         --spring.cloud.nacos.config.enabled=false
# =====================================================

spring:
  application:
    name: ai-platform-workflow
  main:
    allow-bean-definition-overriding: true
  config:
    import: nacos:ai-platform-workflow.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 10000
            read-timeout: 30000
      retryer: 0
      # 不扫描 classpath 上的 @FeignClient interface，只扫 @EnableFeignClients(basePackages)
      # 避免多服务 jar 互引时 FeignClientSpecification bean 冲突
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: 9011

aiplatform:
  trainer:
    base-url: http://127.0.0.1:9008
  inference:
    base-url: http://127.0.0.1:9007
  knowledge:
    base-url: http://127.0.0.1:9005

nacos:
  config:
    import-check:
      enabled: false
  discovery:
    enabled: false
# ★ OP-1 Actuator 运维端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
