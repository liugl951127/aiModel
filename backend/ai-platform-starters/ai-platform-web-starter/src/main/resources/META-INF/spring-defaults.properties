# Spring Boot 通用性能调优默认值
# 由 application.yml 通过 spring.config.import 或 application-{profile}.properties 加载

# ============================================================
# HikariCP 连接池调优
# ============================================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=aiplatform-hikari

# ============================================================
# MyBatis-Plus 默认值
# ============================================================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.global-config.db-config.id-type=ASSIGN_ID
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ============================================================
# 慢 SQL 监控 (aiplatform.sql.*)
# ============================================================
aiplatform.sql.enabled=true
aiplatform.sql.slow-threshold-ms=200
aiplatform.sql.log-enabled=true

# ============================================================
# MyBatis-Plus 分页拦截器
# ============================================================
aiplatform.web.page.enabled=true

# ============================================================
# 性能优化总开关
# ============================================================
aiplatform.perf.enabled=true